<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lmesser-Labs/LANRanger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff88;
            --text: #dcdcdc;
            --muted: #777;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'VCR OSD Mono', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            margin-left: 25px;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .hero-content {
            max-width: 800px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        p {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .cta:hover {
            background: var(--accent);
            color: #000;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            nav {
                display: none;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">Lmesser-Labs/LANRanger</div>
    <nav>
        <a href="#home">Home</a>
        <a href="#blog">Blog</a>
        <a href="#product">Product</a>
        <a href="./about.html">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">

        <p>
            Only odd numbered ports were working outbound.
        </p>

    <a href="https://www.youtube.com/@LANRanger" class="cta">YouTube</a>
    <a href="https://github.com/lmesserStep" class="cta">GitHub</a>
    <a href="" class="cta">Comin soon</a>
        <div class="tcpdump-container">

</div>
</section>

</footer>

</body>
</html>
